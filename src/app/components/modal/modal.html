<div
  class="bg-zinc-900/90 z-20 fixed top-0 left-0 w-full h-full flex items-center justify-center cursor-pointer"
  (click)="onClick()"
>
  <div
    class="frame-shadow relative rope p-0 border-40 border-s-taupe-600 border-bs-taupe-400 border-e-taupe-500 border-be-taupe-700 m-40 w-1/2 h-auto"
  >
    <div class="frame-shadow p-0 m-0 border-12 border-white">
      <img
        class="p-0 m-0 w-full h-auto border-t-2 border-l-2 border-b-2 border-r-2 border-t-gray-500 border-l-gray-500 border-b-gray-300 border-r-gray-300"
        [ngSrc]="`assets/certificates/${imageName}.jpg`"
        alt="{{ imageName }}"
        width="160"
        height="120"
      />
    </div>
  </div>
</div>
