<div class="border border-emerald-100 rounded-2xl flex justify-between h-full">
  <div class="bg-slate-100 w-1/7 p-2 mr-2 rounded-2xl flex items-center justify-center min-w-20">
    <img [src]="item.img" [alt]="item.name" class="w-auto h-10 mx-auto object-contain" />
  </div>
  <div class="w-3/4 h-full flex flex-col gap-1 items-start relative justify-center py-4">
    <h4 class="h-full">{{ item.name }}</h4>
    @if (item.tag) {
      <div
        class="{{ item.tagColor ?? 'bg-emerald-500' }} text-white text-xs font-normal px-1 rounded"
      >
        <span>{{ item.tag }}</span>
      </div>
    }
  </div>
  <button (click)="removeFromCart(item.id)" class="cursor-pointer w-1/14 min-w-10">
    <fa-icon
      [icon]="faTrash"
      class="w-8 h-8 text-emerald-800 hover:text-red-700 transition-colors duration-300"
      aria-label="cart items count"
      aria-hidden="false"
    ></fa-icon>
  </button>
</div>
