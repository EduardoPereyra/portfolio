<div
  class="border rounded w-60 shadow relative border-gray-100 text-emerald-700 cursor-pointer hover:shadow-lg transition-shadow duration-300"
  (mouseover)="showCart = true"
  (mouseleave)="showCart = false"
>
  @if (skill.tag) {
    <div
      class="best-seller absolute top-1 left-1 {{
        skill.tagColor ?? 'bg-emerald-500'
      }} text-white text-xs font-normal px-1 rounded"
    >
      <span>{{ skill.tag }}</span>
    </div>
  }
  <div>
    @if (showCart && !added) {
      <button
        class="flex justify-center mt-1 p-1 absolute top-1 -right-2 cursor-pointer hover:scale-120 transition-transform duration-200"
        (click)="addToCart(skill)"
      >
        <fa-icon
          [icon]="faCartArrowDown"
          class="w-14 h-14 text-emerald-900"
          aria-label="cart items count"
          aria-hidden="false"
        ></fa-icon>
      </button>
    }
    @if (added) {
      <div
        class="flex justify-center mt-1 p-1 absolute -top-1 -right-8 cursor-pointer hover:scale-120 transition-transform duration-200"
      >
        <fa-icon
          [icon]="faCheck"
          class="w-14 h-14 text-green-500"
          aria-label="item added to cart"
          aria-hidden="false"
        ></fa-icon>
      </div>
    }
    <div class="bg-slate-100 w-full py-4">
      <img [src]="skill.img" [alt]="skill.name" class="w-auto h-16 mx-auto max-w-4/5" />
    </div>
    <p class="text-center mt-2 text-xl">{{ skill.name }}</p>
    <div
      class="flex justify-center mt-2 pb-4"
      (mouseover)="hoverStars = true"
      (mouseleave)="hoverStars = false"
    >
      @if (hoverStars) {
        <div
          class="flex items-center justify-center text-emerald-900 text-sm font-semibold bg-zinc-100 px-2 py-1 rounded"
        >
          {{ skill.experience }}
        </div>
      } @else {
        @for (star of [1, 2, 3, 4, 5]; track star) {
          <fa-icon
            class="w-4 h-4 mx-sm"
            [icon]="faStar"
            aria-label="star"
            aria-hidden="false"
            [class.text-yellow-500]="star <= skill.level"
            [class.text-gray-300]="star > skill.level"
          ></fa-icon>
        }
      }
    </div>
  </div>
</div>
